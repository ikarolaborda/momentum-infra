name: Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: momentum
          POSTGRES_PASSWORD: momentum
          POSTGRES_DB: momentum
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms256m -Xmx256m
        ports: ['9200:9200']
        options: --health-cmd "curl -f http://localhost:9200/_cluster/health" --health-interval 10s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://momentum:momentum@localhost:5432/momentum
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ELASTICSEARCH_NODE: http://localhost:9200
      JWT_SECRET: test-secret
      STRIPE_SECRET_KEY: sk_test_xxx
      RESERVATION_TTL_SECONDS: 420

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build shared packages
        run: |
          cd momentum-shared && npm ci && npm run build && cd ../..
          cd momentum-database && npm ci && cd ../..

      - name: Setup database
        run: |
          cd momentum-database
          npx prisma generate
          npx prisma migrate deploy
          npx ts-node prisma/seed.ts
          cd ../..

      - name: Install and build services
        run: |
          for service in event-service booking-service search-service api-gateway; do
            cd "$service"
            cp -r ../../momentum-database/prisma ./prisma 2>/dev/null || true
            npm ci
            npx prisma generate 2>/dev/null || true
            npm run build
            cd ../..
          done

      - name: Start services
        run: |
          cd momentum-event-service && npm run start:prod &
          cd momentum-booking-service && npm run start:prod &
          cd momentum-search-service && npm run start:prod &
          cd momentum-api-gateway && npm run start:prod &
          sleep 15

      - name: Run integration tests
        run: npx jest --config tests/integration/jest.config.ts

      - name: Run e2e tests
        run: npx jest --config tests/e2e/jest.config.ts
