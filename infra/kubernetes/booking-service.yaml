apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: momentum
  labels:
    app: booking-service
    tier: backend
spec:
  replicas: 5
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
        tier: backend
    spec:
      containers:
        - name: booking-service
          image: momentum/booking-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: momentum-config
            - secretRef:
                name: momentum-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: momentum
spec:
  selector:
    app: booking-service
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: booking-service-hpa
  namespace: momentum
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: booking-service
  minReplicas: 5
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
